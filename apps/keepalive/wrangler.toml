name = "azimuth-keepalive"
main = "src/index.js"
compatibility_date = "2025-01-01"

[triggers]
crons = ["*/5 * * * *"]

[vars]
SERVER_URL = "https://api.azimuth.net.in"
WORKER_URL = "https://worker.azimuth.net.in"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1