services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: azimuth_perfumers
    ports:
      - "5434:5432"
    volumes:
      - azimuth_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - azimuth_redis_data:/data
    command: redis-server --appendonly yes

volumes:
  azimuth_postgres_data:
  azimuth_redis_data:
