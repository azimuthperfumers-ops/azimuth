services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: azimuth_perfumers
    ports:
      - "5434:5432"
    volumes:
      - azimuth_postgres_data:/var/lib/postgresql/data

volumes:
  azimuth_postgres_data:
