<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#f9f7f4;font-family:'Georgia',serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f9f7f4;padding:40px 16px;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background:#fff;border:1px solid #e8e2da;">

        <tr><td style="background:#111;padding:32px 40px;text-align:center;">
          <p style="margin:0;color:#c9a96e;letter-spacing:0.3em;font-size:11px;text-transform:uppercase;font-family:Arial,sans-serif;">Azimuth Perfumers</p>
        </td></tr>

        <tr><td style="padding:40px;">
          <p style="margin:0 0 8px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#999;font-family:Arial,sans-serif;">On Its Way</p>
          <h1 style="margin:0 0 24px;font-size:24px;color:#111;font-weight:normal;">Your order has shipped, {{name}}.</h1>
          <p style="margin:0 0 32px;color:#555;font-size:15px;line-height:1.7;">
            Your fragrance is now in transit. Track it anytime using the details below.
          </p>

          <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e8e2da;margin-bottom:24px;">
            <tr>
              <td style="padding:20px;border-bottom:1px solid #e8e2da;">
                <p style="margin:0 0 4px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#999;font-family:Arial,sans-serif;">Order Number</p>
                <p style="margin:0;font-size:16px;font-family:'Courier New',monospace;color:#111;">{{order_number}}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px;">
                <p style="margin:0 0 4px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#999;font-family:Arial,sans-serif;">Delhivery Waybill</p>
                <p style="margin:0;font-size:16px;font-family:'Courier New',monospace;color:#111;">{{waybill}}</p>
              </td>
            </tr>
          </table>

          <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:32px;">
            <tr><td>
              <a href="{{track_url}}" style="display:inline-block;background:#111;color:#fff;text-decoration:none;padding:14px 28px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;font-family:Arial,sans-serif;">
                Track Shipment
              </a>
            </td></tr>
          </table>

          <p style="margin:0;color:#888;font-size:13px;line-height:1.7;">
            Questions? Write to <a href="mailto:azimuthperfumers@gmail.com" style="color:#111;">azimuthperfumers@gmail.com</a>.
          </p>
        </td></tr>

        <tr><td style="padding:24px 40px;border-top:1px solid #e8e2da;text-align:center;">
          <p style="margin:0;font-size:11px;color:#bbb;font-family:Arial,sans-serif;letter-spacing:0.1em;">© Azimuth Perfumers</p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
