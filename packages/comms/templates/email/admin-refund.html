<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:32px 16px;">
    <tr><td align="center">
      <table width="520" cellpadding="0" cellspacing="0" style="background:#fff;border:1px solid #ddd;">

        <tr><td style="background:#7f1d1d;padding:20px 32px;">
          <p style="margin:0;color:#fca5a5;letter-spacing:0.2em;font-size:11px;text-transform:uppercase;">Azimuth — Admin Alert</p>
        </td></tr>

        <tr><td style="padding:32px;">
          <h2 style="margin:0 0 8px;font-size:18px;color:#111;">Refund Initiated</h2>
          <p style="margin:0 0 24px;font-size:14px;color:#555;">A refund has been processed. No action required.</p>
          <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e0e0e0;margin-bottom:24px;">
            <tr style="background:#f9f9f9;">
              <td style="padding:12px 16px;font-size:12px;color:#666;text-transform:uppercase;letter-spacing:0.1em;">Order</td>
              <td style="padding:12px 16px;font-size:14px;font-family:'Courier New',monospace;color:#111;">{{order_number}}</td>
            </tr>
            <tr>
              <td style="padding:12px 16px;font-size:12px;color:#666;text-transform:uppercase;letter-spacing:0.1em;">Refund Amount</td>
              <td style="padding:12px 16px;font-size:14px;font-weight:bold;color:#b91c1c;">{{amount}}</td>
            </tr>
            <tr style="background:#f9f9f9;">
              <td style="padding:12px 16px;font-size:12px;color:#666;text-transform:uppercase;letter-spacing:0.1em;">Refunded To</td>
              <td style="padding:12px 16px;font-size:14px;font-weight:bold;color:#111;">{{refund_destination}}</td>
            </tr>
          </table>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
