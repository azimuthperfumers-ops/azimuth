name: deploy

# Build server + worker + migrate images in CI (keeps build load off the VPS),
# push to GHCR, then SSH to the VPS and roll out.

on:
  push:
    branches: [master]
    paths:
      - "apps/server/**"
      - "apps/worker/**"
      - "packages/**"
      - "Dockerfile.server"
      - "Dockerfile.worker"
      - "Dockerfile.migrate"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
      - "pnpm-lock.yaml"
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: server
            dockerfile: Dockerfile.server
          - name: worker
            dockerfile: Dockerfile.worker
          - name: migrate
            dockerfile: Dockerfile.migrate
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "lc=${OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/azimuth-${{ matrix.name }}:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/azimuth-${{ matrix.name }}:latest
          cache-from: type=gha,scope=azimuth-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=azimuth-${{ matrix.name }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Roll out on the VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/azimuth/deploy/scripts/deploy.sh ${{ github.sha }}
