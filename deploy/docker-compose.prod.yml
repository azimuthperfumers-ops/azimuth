# Production stack for the Azimuth VPS.
#
# server + worker + a self-hosted Redis (for the BullMQ queue) run here, plus a
# one-shot migrator and a TLS proxy. Postgres is managed by Neon (external URL in
# .env.production). Redis is local — a job queue burns commands fast, so a metered
# managed tier isn't worth it; redis:7-alpine is tiny (job state only). The user /
# admin Next.js apps are hosted on Vercel and reach this box over https://${API_DOMAIN}.
#
# Images are built in GitHub Actions and pulled from GHCR — the VPS never builds.
#
# Usage on the VPS:
#   cd /opt/azimuth/deploy
#   docker compose --env-file .env.production -f docker-compose.prod.yml pull
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d

name: azimuth

services:
  # BullMQ queue store. Local, unmetered. appendonly persistence to a volume so
  # queued jobs survive a restart.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - azimuth_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: applies pending Drizzle migrations to Neon, then exits 0.
  # server/worker wait for this to finish before starting.
  migrate:
    image: ${REGISTRY}/azimuth-migrate:${IMAGE_TAG:-latest}
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL}

  server:
    image: ${REGISTRY}/azimuth-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: ${REGISTRY}/azimuth-worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    # Override the shared PORT=4000 (that's the server's) so the worker's health
    # server binds 3002 — the port Caddy's /worker-health route proxies to.
    environment:
      PORT: "3002"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # TLS termination + reverse proxy. Caddy auto-provisions/renews a Let's
  # Encrypt cert for ${API_DOMAIN}.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server

volumes:
  azimuth_redis_data:
  caddy_data:
  caddy_config:
