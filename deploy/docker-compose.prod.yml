# Production stack for the Azimuth VPS.
#
# ONLY server + worker run here (plus a one-shot migrator and a TLS proxy).
# Postgres is managed by Neon, Redis by Upstash — both reached over their URLs
# in .env.production. The user / admin Next.js apps are hosted on Vercel and
# reach this box over https://${API_DOMAIN}.
#
# Images are built in GitHub Actions and pulled from GHCR — the VPS never builds.
#
# Usage on the VPS:
#   cd /opt/azimuth/deploy
#   docker compose --env-file .env.production -f docker-compose.prod.yml pull
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d

name: azimuth

services:
  # One-shot: applies pending Drizzle migrations to Neon, then exits 0.
  # server/worker wait for this to finish before starting.
  migrate:
    image: ${REGISTRY}/azimuth-migrate:${IMAGE_TAG:-latest}
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL}

  server:
    image: ${REGISTRY}/azimuth-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: ${REGISTRY}/azimuth-worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      migrate:
        condition: service_completed_successfully

  # TLS termination + reverse proxy. Caddy auto-provisions/renews a Let's
  # Encrypt cert for ${API_DOMAIN}.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server

volumes:
  caddy_data:
  caddy_config:
